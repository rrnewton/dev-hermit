# mypy configuration for the mcp-debugger experiment.
# The agents are fully typed and pass `mypy --strict`. The `mcp` package is an
# optional runtime dependency (installed by setup.sh, guarded by try/except at
# import time), so it need not be present for static type checking.
[mypy]

[mypy-mcp]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True
